<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iflow-run - 会话轨迹查看器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="enhancements.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="logo-text">iflow-run</span>
        </div>
        <button id="toggleSidebarBtn" class="btn btn-icon sidebar-toggle" title="收起侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-section">
        <h2 class="section-title">项目列表</h2>
        <div id="projectsList" class="projects-list">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="header">
        <h1 id="currentProjectTitle" class="project-title">选择一个项目</h1>
        <div class="header-actions">
          <div class="search-container">
            <button id="searchToggleBtn" class="btn btn-icon" title="搜索">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
            </button>
            <div class="search-box hidden" id="searchBox">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
              <input type="text" id="searchInput" placeholder="搜索会话..." autocomplete="off" />
            </div>
          </div>
          <button id="themeBtn" class="btn btn-icon" title="切换主题">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="moon-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button id="refreshBtn" class="btn btn-icon" title="刷新">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1 20v-6h6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="batchModeBtn" class="btn btn-icon" title="批量操作模式">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </button>
          <button id="settingsBtn" class="btn btn-icon" title="设置">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button id="aiAssistantBtn" class="btn btn-icon" title="AI 助手">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A1.5 1.5 0 0 0 6 14.5 1.5 1.5 0 0 0 7.5 16 1.5 1.5 0 0 0 9 14.5 1.5 1.5 0 0 0 7.5 13m9 0a1.5 1.5 0 0 0-1.5 1.5 1.5 1.5 0 0 0 1.5 1.5 1.5 1.5 0 0 0 1.5-1.5 1.5 1.5 0 0 0-1.5-1.5M12 17c-2 0-3 1-3 1h6s-1-1-3-1z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- 高级筛选面板 (v1.2.0) -->
      <div id="advancedFilterPanel" class="advanced-filter-panel hidden">
        <div class="filter-row">
          <div class="filter-item">
            <label>模型</label>
            <select id="modelFilter" class="filter-select">
              <option value="">全部模型</option>
            </select>
          </div>
          <div class="filter-item">
            <label>状态</label>
            <select id="statusFilter" class="filter-select">
              <option value="">全部状态</option>
              <option value="success">成功</option>
              <option value="error">有错误</option>
            </select>
          </div>
          <div class="filter-item">
            <label>标签</label>
            <select id="tagFilter" class="filter-select">
              <option value="">全部标签</option>
            </select>
          </div>
          <button id="resetFiltersBtn" class="btn btn-secondary btn-small">重置</button>
        </div>
      </div>

      <!-- 批量操作面板 (v1.2.0) -->
      <div id="batchActionsPanel" class="batch-actions-panel hidden">
        <div class="batch-actions-content">
          <span class="batch-info">已选择 <strong id="selectedCount">0</strong> 个会话</span>
          <div class="batch-actions-buttons">
            <button id="selectAllBtn" class="btn btn-secondary btn-small">全选</button>
            <button id="batchDeleteBtn" class="btn btn-danger btn-small">🗑️ 批量删除</button>
          </div>
        </div>
      </div>

      <!-- 会话列表 -->
      <div id="sessionsContainer" class="sessions-container">
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p>选择一个项目查看会话</p>
        </div>
      </div>

      <!-- 会话详情 -->
      <div id="sessionDetail" class="session-detail hidden">
        <!-- 会话上下文面板 -->
        <div id="sessionContextPanel" class="session-context-panel">
          <div class="context-item" id="contextCwd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="context-icon">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span id="contextCwdValue" class="context-value">--</span>
            <button id="openWorkdirBtn" class="btn btn-icon btn-small" title="打开工作目录" style="display: none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>
          </div>
          <div class="context-item" id="contextGitBranch" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="context-icon">
              <line x1="6" y1="3" x2="6" y2="15"/>
              <circle cx="18" cy="6" r="3"/>
              <circle cx="6" cy="18" r="3"/>
              <path d="M18 9a9 9 0 0 1-9 9"/>
            </svg>
            <span id="contextGitBranchValue" class="context-value">--</span>
          </div>
          <div class="context-item" id="contextVersion">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="context-icon">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span id="contextVersionValue" class="context-value">--</span>
          </div>
        </div>

        <div class="session-header">
          <button id="backBtn" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 6px;">
              <path d="M19 12H5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            返回
          </button>
          <div class="session-info">
            <span id="sessionTime" class="session-time"></span>
          </div>
          <div class="session-actions">
            <div class="message-search-container">
              <button id="messageSearchToggleBtn" class="btn btn-icon" title="搜索消息">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/>
                  <path d="M21 21l-4.35-4.35"/>
                </svg>
              </button>
              <div class="message-search-box hidden" id="messageSearchBox">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/>
                  <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="messageSearchInput" placeholder="搜索消息..." autocomplete="off" />
                <button id="clearMessageSearch" class="btn btn-icon" style="width: 28px; height: 28px; padding: 0; display: none;">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;">
                    <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
            <select id="messageFilter" class="btn btn-secondary" style="padding: 8px 12px;">
              <option value="all">全部消息</option>
              <option value="user">用户消息</option>
              <option value="assistant">助手消息</option>
              <option value="tools">工具调用</option>
            </select>
            <button id="openIflowBtn" class="btn btn-primary" title="在工作目录打开 iflow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <polyline points="4 17 10 11 4 5" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="12" y1="19" x2="20" y2="19" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              打开 iflow
            </button>
            <button id="openDirectoryBtn" class="btn btn-secondary" title="打开会话记录文件所在目录">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              会话目录
            </button>
            <button id="scrollToBottomBtn" class="btn btn-secondary" title="跳到最后一条消息">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M12 5v14M19 12l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              底部
            </button>
            <button id="analyzeSessionBtn" class="btn btn-secondary" title="AI 分析此会话">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
              分析
            </button>
            <button id="toggleMessageIndexBtn" class="btn btn-secondary" title="消息目录">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              目录
            </button>
          </div>
        </div>

        <div id="messageIndexPanel" class="message-index-panel hidden">
          <div class="message-index-header">
            <span>用户消息目录</span>
            <button id="closeMessageIndexBtn" class="btn btn-icon" style="width: 28px; height: 28px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
                <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div id="messageIndexList" class="message-index-list">
          </div>
        </div>

        <div id="messagesContainer" class="messages-container">
        </div>
      </div>
    </main>
  </div>

  <!-- WebSocket 状态指示器 -->
  <div class="ws-status" id="wsStatus" style="display: none;">
    <div class="ws-status-indicator" id="wsStatusIndicator"></div>
    <span id="wsStatusText">实时连接</span>
  </div>

<!-- 设置面板模态框 -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>⚙️ 设置</h2>
      <button id="closeSettingsBtn" class="btn btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="settings-section">
        <h3 class="settings-section-title">外观设置</h3>
        <div class="setting-item">
          <label class="setting-label">
            <span>主题模式</span>
          </label>
          <select id="settingTheme" class="setting-select">
            <option value="dark">暗色模式</option>
            <option value="light">亮色模式</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-section-title">显示设置</h3>
        <div class="setting-item">
          <label class="setting-label">
            <span>每页显示项目数</span>
          </label>
          <select id="settingPageSize" class="setting-select">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
        <div class="setting-item">
          <label class="setting-label">
            <span>默认消息筛选</span>
          </label>
          <select id="settingDefaultFilter" class="setting-select">
            <option value="all">全部消息</option>
            <option value="user">用户消息</option>
            <option value="assistant">助手消息</option>
            <option value="tools">工具调用</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-section-title">功能设置</h3>
        <div class="setting-item">
          <label class="setting-label">
            <span>自动刷新（WebSocket）</span>
          </label>
          <label class="toggle-switch">
            <input type="checkbox" id="settingAutoRefresh" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="settings-section">
        <h3 class="settings-section-title">🤖 AI 服务配置</h3>
        <div class="setting-item">
          <label class="setting-label">
            <span>API 服务商</span>
          </label>
          <select id="settingAiProvider" class="setting-select">
            <option value="iflow">心流开放平台 (iflow.cn)</option>
            <option value="openai">OpenAI</option>
          </select>
        </div>
        <div class="setting-item">
          <label class="setting-label">
            <span>API Key</span>
          </label>
          <div style="display: flex; gap: 8px; flex: 1;">
            <input type="password" id="settingApiKey" class="setting-input" placeholder="输入 API Key..." style="flex: 1; padding: 8px 12px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary);">
            <button id="testApiConnectionBtn" class="btn btn-secondary btn-small">测试连接</button>
          </div>
        </div>
        <div class="setting-item">
          <label class="setting-label">
            <span>AI 模型</span>
          </label>
          <select id="settingAiModel" class="setting-select">
            <option value="iflow-rome-30ba3b">iFlow-ROME-30B (推荐)</option>
            <option value="qwen3-coder-plus">Qwen3-Coder-Plus</option>
            <option value="qwen3-max">Qwen3-Max</option>
            <option value="kimi-k2-0905">Kimi-K2</option>
          </select>
        </div>
        <div id="apiKeySourceHint" style="display: none; margin-top: 8px; padding: 8px 12px; border-radius: 6px; font-size: 12px; background: var(--bg-tertiary); color: var(--text-muted);">
          💡 已从环境变量读取 API Key
        </div>
        <div id="apiConnectionStatus" style="display: none; margin-top: 8px; padding: 8px 12px; border-radius: 6px; font-size: 12px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="resetSettingsBtn" class="btn btn-secondary">恢复默认</button>
      <button id="saveSettingsBtn" class="btn btn-primary">保存设置</button>
    </div>
  </div>
</div>

<!-- AI 助手侧边栏 (v1.3.0 P1) -->
<div id="aiAssistantPanel" class="ai-assistant-panel hidden">
  <div class="ai-assistant-header">
    <div class="ai-assistant-title">
      <span class="ai-icon">🤖</span>
      <span>AI 助手</span>
    </div>
    <div class="ai-assistant-actions">
      <button id="aiNewChatBtn" class="btn btn-icon btn-small" title="新建会话" style="width: 28px; height: 28px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
          <path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="aiClearContextBtn" class="btn btn-icon btn-small" title="清除上下文" style="width: 28px; height: 28px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
          <polyline points="3 6 5 6 21 6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="closeAiAssistantBtn" class="btn btn-icon" style="width: 28px; height: 28px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
          <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="aiChatMessages" class="ai-chat-messages">
    <div class="ai-welcome-message">
      <div class="ai-welcome-icon">👋</div>
      <div class="ai-welcome-text">
        <p>你好！我是 AI 助手，可以回答技术问题和提供建议。</p>
        <p style="color: var(--text-muted); font-size: 12px; margin-top: 12px;">在会话详情页点击"分析会话"可获取详细分析报告</p>
      </div>
    </div>
  </div>
  <div class="ai-chat-input-area">
    <div class="ai-chat-input-wrapper">
      <textarea id="aiChatInput" placeholder="输入消息... (Shift+Enter 换行)" rows="1"></textarea>
      <button id="aiSendBtn" class="btn btn-primary btn-small" title="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
          <line x1="22" y1="2" x2="11" y2="13" stroke-linecap="round" stroke-linejoin="round"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- 会话分析报告模态框 (v1.3.0 P1) -->
<div id="analysisModal" class="modal">
  <div class="modal-content" style="max-width: 800px;">
    <div class="modal-header">
      <h2>📊 会话分析报告</h2>
      <button id="closeAnalysisBtn" class="btn btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="analysisLoading" style="text-align: center; padding: 60px;">
        <div style="font-size: 48px; margin-bottom: 16px;">🔄</div>
        <p style="color: var(--text-secondary);">AI 正在分析会话内容...</p>
        <p style="color: var(--text-muted); font-size: 12px; margin-top: 8px;">这可能需要几秒钟</p>
      </div>
      <div id="analysisResult" style="display: none;">
        <!-- 摘要 -->
        <div class="analysis-section">
          <h3 class="analysis-section-title">📝 会话摘要</h3>
          <div id="analysisSummary" class="analysis-content"></div>
        </div>
        <!-- 关键决策 -->
        <div class="analysis-section">
          <h3 class="analysis-section-title">🎯 关键决策</h3>
          <div id="analysisDecisions" class="analysis-content"></div>
        </div>
        <!-- 问题解决 -->
        <div class="analysis-section">
          <h3 class="analysis-section-title">🔧 问题解决过程</h3>
          <div id="analysisProblems" class="analysis-content"></div>
        </div>
        <!-- 效率统计 -->
        <div class="analysis-section">
          <h3 class="analysis-section-title">📈 效率统计</h3>
          <div id="analysisStats" class="analysis-stats-grid"></div>
        </div>
        <!-- 建议 -->
        <div class="analysis-section">
          <h3 class="analysis-section-title">💡 改进建议</h3>
          <div id="analysisSuggestions" class="analysis-content"></div>
        </div>
        <!-- 提问改进建议 -->
        <div class="analysis-section" id="promptImprovementsSection" style="display: none;">
          <h3 class="analysis-section-title">🎯 提问改进建议</h3>
          <div id="analysisPromptImprovements" class="analysis-content"></div>
        </div>
      </div>
      <div id="analysisError" style="display: none; text-align: center; padding: 40px;">
        <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
        <p style="color: var(--text-secondary); margin-bottom: 8px;">分析失败</p>
        <p id="analysisErrorMsg" style="color: var(--text-muted); font-size: 12px;"></p>
      </div>
    </div>
    <div class="modal-footer" id="analysisFooter" style="display: none;">
      <button id="exportAnalysisBtn" class="btn btn-secondary">导出报告</button>
      <button id="reanalyzeBtn" class="btn btn-primary">重新分析</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="enhancements.js"></script>

</body>
