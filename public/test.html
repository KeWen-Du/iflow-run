<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Test iflow-run</title>
</head>
<body>
  <h1>Test iflow-run API</h1>
  <button id="testProjects">测试项目列表</button>
  <button id="testSession">测试会话详情</button>
  <pre id="output"></pre>

  <script>
    const output = document.getElementById('output');

    async function testProjects() {
      output.textContent = 'Loading projects...\n';
      try {
        const response = await fetch('/api/projects');
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
        console.log('Projects loaded:', data);
      } catch (error) {
        output.textContent = 'Error: ' + error.message;
        console.error('Error loading projects:', error);
      }
    }

    async function testSession() {
      output.textContent = 'Loading session...\n';
      try {
        const response = await fetch('/api/sessions/-F-dev-code-iflow-project-iflow-run/session-82ce306a-7616-4eea-9bdc-fa48b1d06433');
        const data = await response.json();
        output.textContent = 'Session loaded! Message count: ' + data.length + '\n\nFirst message:\n' + JSON.stringify(data[0], null, 2);
        console.log('Session loaded:', data);
      } catch (error) {
        output.textContent = 'Error: ' + error.message;
        console.error('Error loading session:', error);
      }
    }

    document.getElementById('testProjects').addEventListener('click', testProjects);
    document.getElementById('testSession').addEventListener('click', testSession);
  </script>
</body>
</html>
