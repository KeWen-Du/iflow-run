<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iflow-run - 会话轨迹查看器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="enhancements.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="logo-text">iflow-run</span>
        </div>
        <button id="toggleSidebarBtn" class="btn btn-icon sidebar-toggle" title="收起侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-section">
        <h2 class="section-title">项目列表</h2>
        <div id="projectsList" class="projects-list">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="header">
        <h1 id="currentProjectTitle" class="project-title">选择一个项目</h1>
        <div class="header-actions">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索会话..." />
          </div>
          <button id="statsBtn" class="btn btn-icon" title="统计">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 20V10M12 20V4M6 20v-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="themeBtn" class="btn btn-icon" title="切换主题">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="moon-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button id="refreshBtn" class="btn btn-icon" title="刷新">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1 20v-6h6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- 会话列表 -->
      <div id="sessionsContainer" class="sessions-container">
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p>选择一个项目查看会话</p>
        </div>
      </div>

      <!-- 会话详情 -->
      <div id="sessionDetail" class="session-detail hidden">
        <!-- 会话上下文面板 -->
        <div id="sessionContextPanel" class="session-context-panel">
          <div class="context-item" id="contextCwd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="context-icon">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span id="contextCwdValue" class="context-value">--</span>
          </div>
          <div class="context-item" id="contextGitBranch" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="context-icon">
              <line x1="6" y1="3" x2="6" y2="15"/>
              <circle cx="18" cy="6" r="3"/>
              <circle cx="6" cy="18" r="3"/>
              <path d="M18 9a9 9 0 0 1-9 9"/>
            </svg>
            <span id="contextGitBranchValue" class="context-value">--</span>
          </div>
          <div class="context-item" id="contextVersion">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="context-icon">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span id="contextVersionValue" class="context-value">--</span>
          </div>
        </div>

        <div class="session-header">
          <button id="backBtn" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 6px;">
              <path d="M19 12H5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            返回
          </button>
          <div class="session-info">
            <span id="sessionTime" class="session-time"></span>
          </div>
          <div class="session-actions">
            <div class="message-search-box">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
              </svg>
              <input type="text" id="messageSearchInput" placeholder="搜索消息..." />
              <button id="clearMessageSearch" class="btn btn-icon" style="width: 28px; height: 28px; padding: 0; display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;">
                  <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <select id="messageFilter" class="btn btn-secondary" style="padding: 8px 12px;">
              <option value="all">全部消息</option>
              <option value="user">用户消息</option>
              <option value="assistant">助手消息</option>
              <option value="tools">工具调用</option>
            </select>
            <button id="exportMarkdownBtn" class="btn btn-secondary" title="导出为 Markdown">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="7 10 12 15 17 10" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="12" y1="15" x2="12" y2="3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Markdown
            </button>
            <button id="exportJsonBtn" class="btn btn-secondary" title="导出为 JSON">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="7 10 12 15 17 10" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="12" y1="15" x2="12" y2="3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              JSON
            </button>
            <button id="openIflowBtn" class="btn btn-primary" title="在工作目录打开 iflow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <polyline points="4 17 10 11 4 5" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="12" y1="19" x2="20" y2="19" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              打开 iflow
            </button>
            <button id="openDirectoryBtn" class="btn btn-secondary" title="打开项目目录">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="12 11 17 16 22 11" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 2)"/>
              </svg>
              打开目录
            </button>
            <button id="scrollToBottomBtn" class="btn btn-secondary" title="跳到最后一条消息">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M12 5v14M19 12l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              底部
            </button>
            <button id="toggleMessageIndexBtn" class="btn btn-secondary" title="消息目录">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px; margin-right: 4px;">
                <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              目录
            </button>
          </div>
        </div>

        <div id="messageIndexPanel" class="message-index-panel hidden">
          <div class="message-index-header">
            <span>用户消息目录</span>
            <button id="closeMessageIndexBtn" class="btn btn-icon" style="width: 28px; height: 28px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;">
                <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div id="messageIndexList" class="message-index-list">
          </div>
        </div>

        <div id="messagesContainer" class="messages-container">
        </div>
      </div>
    </main>
  </div>

  <!-- WebSocket 状态指示器 -->
  <div class="ws-status" id="wsStatus" style="display: none;">
    <div class="ws-status-indicator" id="wsStatusIndicator"></div>
    <span id="wsStatusText">实时连接</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@17.0.3/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
  <script src="enhancements.js"></script>

<!-- 统计面板模态框 -->
<div id="statsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>使用统计</h2>
      <button id="closeStatsBtn" class="btn btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="6" y1="6" x2="18" y2="18" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3h18v18H3zM9 3v18M15 3v18M3 9h18M3 15h18"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="totalProjects">0</div>
            <div class="stat-label">项目总数</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="totalSessions">0</div>
            <div class="stat-label">会话总数</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="totalMessages">0</div>
            <div class="stat-label">消息总数</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="totalToolCalls">0</div>
            <div class="stat-label">工具调用次数</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="totalTokens">0</div>
            <div class="stat-label">Token 总消耗</div>
          </div>
        </div>
      </div>
      <div class="token-breakdown" style="margin-top: 20px; padding: 16px; background: var(--bg-tertiary); border-radius: 8px;">
        <h3 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary);">Token 消耗明细</h3>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
          <div>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">输入 Token</div>
            <div style="font-size: 20px; font-weight: 700; color: var(--accent-primary);" id="totalInputTokens">0</div>
          </div>
          <div>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">输出 Token</div>
            <div style="font-size: 20px; font-weight: 700; color: var(--success);" id="totalOutputTokens">0</div>
          </div>
          <div>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">预估成本 (USD)</div>
            <div style="font-size: 20px; font-weight: 700; color: var(--text-secondary);" id="estimatedCost">$0.00</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


</body>
</html>
